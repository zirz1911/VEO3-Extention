<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PD Auto VEO3.1</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <header>
      <div class="logo">
        <button class="menu-btn" id="menuBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 7L22 7" stroke="#F97316" stroke-width="2" stroke-linecap="round" />
            <path d="M2 12L22 12" stroke="#F97316" stroke-width="2" stroke-linecap="round" />
            <path d="M2 17L22 17" stroke="#F97316" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
        <h1>Gen Flow Flow</h1>
        <!-- Dropdown Menu -->
        <div id="platformMenu" class="dropdown-menu hidden">
          <div class="dropdown-item" data-url="https://labs.google/">Flow</div>
          <div class="dropdown-item" data-url="https://sora.chatgpt.com/">SORA</div>
          <div class="dropdown-item" data-url="https://www.meta.ai/">Meta</div>
        </div>
      </div>
      <button class="settings-btn" id="settingsBtn" title="API Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- FLOW UI SECTION -->
    <div id="flowUI">

      <!-- Global Inputs -->
      <div class="global-inputs">
        <div class="global-images-row">
          <div class="global-image-field">
            <label class="section-label">Face Reference</label>
            <label class="image-upload-area image-upload-sm" id="faceUploadArea" for="faceImageInput">
              <input type="file" id="faceImageInput" accept="image/*" style="display:none">
              <div class="upload-placeholder" id="faceUploadPlaceholder">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 5V19M5 12H19" stroke="#64748B" stroke-width="2" stroke-linecap="round" />
                </svg>
                <span>Face</span>
              </div>
              <img id="faceImagePreview" class="image-preview hidden" src="" alt="Face Reference">
              <button class="remove-image-btn hidden" id="removeFaceImageBtn" type="button">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M18 6L6 18M6 6l12 12" />
                </svg>
              </button>
            </label>
          </div>

          <div class="global-image-field">
            <label class="section-label">Product Image</label>
            <label class="image-upload-area image-upload-sm" id="imageUploadArea" for="productImageInput">
              <input type="file" id="productImageInput" accept="image/*" style="display:none">
              <div class="upload-placeholder" id="uploadPlaceholder">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 5V19M5 12H19" stroke="#64748B" stroke-width="2" stroke-linecap="round" />
                </svg>
                <span>Product</span>
              </div>
              <img id="imagePreview" class="image-preview hidden" src="" alt="Product Preview">
              <button class="remove-image-btn hidden" id="removeImageBtn" type="button">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M18 6L6 18M6 6l12 12" />
                </svg>
              </button>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="productName" placeholder="Optional">
        </div>
      </div>

      <!-- Step Indicator -->
      <div class="step-indicator">
        <button class="step-btn active" data-step="1" id="stepBtn1">
          <span class="step-num">1</span>
          <span class="step-label">Image</span>
        </button>
        <!-- Steps 2-4 hidden during image testing -->
        <div class="step-connector" style="display:none;"></div>
        <button class="step-btn" data-step="2" id="stepBtn2" style="display:none;">
          <span class="step-num">2</span>
          <span class="step-label">Video</span>
        </button>
        <div class="step-connector" style="display:none;"></div>
        <button class="step-btn" data-step="3" id="stepBtn3" style="display:none;">
          <span class="step-num">3</span>
          <span class="step-label">Caption</span>
        </button>
        <div class="step-connector" style="display:none;"></div>
        <button class="step-btn" data-step="4" id="stepBtn4" style="display:none;">
          <span class="step-num">4</span>
          <span class="step-label">เริ่ม</span>
        </button>
      </div>

      <!-- Step 1: Image Generation -->
      <div class="step-panel active" id="stepPanel1">
        <div class="form-group">
          <label>GENDER</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="gender1" value="male" checked>
              <span class="radio-label"><span class="radio-dot"></span>ผู้ชาย</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="gender1" value="female">
              <span class="radio-label"><span class="radio-dot"></span>ผู้หญิง</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label>ACTION</label>
          <select id="action1">
            <option value="holding">holding</option>
            <option value="pointing at">pointing at</option>
            <option value="installing">installing</option>
            <option value="unboxing">unboxing</option>
            <option value="standing next to">standing next to</option>
            <option value="demonstrating">demonstrating</option>
          </select>
        </div>

        <div class="form-group">
          <label>LOCATION</label>
          <select id="location1">
            <option value="หน้าบ้านชนบทไทย">หน้าบ้านชนบทไทย</option>
            <option value="ห้องนั่งเล่น">ห้องนั่งเล่น</option>
            <option value="ร้านค้า">ร้านค้า</option>
            <option value="สวนหลังบ้าน">สวนหลังบ้าน</option>
            <option value="หน้าโรงงาน">หน้าโรงงาน</option>
            <option value="ริมถนนหมู่บ้าน">ริมถนนหมู่บ้าน</option>
            <option value="ดาดฟ้า">ดาดฟ้า</option>
          </select>
        </div>

        <div class="form-group">
          <label>OUTFIT</label>
          <select id="outfit1">
            <option value="เสื้อยืดคอกลมกับกางเกงขาสั้น">เสื้อยืดคอกลมกับกางเกงขาสั้น</option>
            <option value="ชุดช่าง">ชุดช่าง</option>
            <option value="เสื้อเชิ้ตลำลอง">เสื้อเชิ้ตลำลอง</option>
            <option value="ชุดแม่บ้าน">ชุดแม่บ้าน</option>
            <option value="เสื้อโปโลกับกางเกงขายาว">เสื้อโปโลกับกางเกงขายาว</option>
          </select>
        </div>

        <div class="form-group">
          <label>MOOD</label>
          <select id="mood1">
            <option value="ยิ้มภูมิใจแบบธรรมชาติ">ยิ้มภูมิใจแบบธรรมชาติ</option>
            <option value="กำลังอธิบายอย่างตั้งใจ">กำลังอธิบายอย่างตั้งใจ</option>
            <option value="ยิ้มแบบพอใจหลังติดตั้งเสร็จ">ยิ้มแบบพอใจหลังติดตั้งเสร็จ</option>
            <option value="ตื่นเต้นตอนแกะกล่อง">ตื่นเต้นตอนแกะกล่อง</option>
          </select>
        </div>

        <div class="form-group">
          <label>Prompt Preview</label>
          <textarea id="promptPreview1" class="prompt-preview" rows="10" readonly placeholder="Prompt จะแสดงที่นี่..."></textarea>
        </div>

        <div class="actions step-nav">
          <button id="copyPrompt1Btn" class="btn btn-secondary">
            <span class="icon">📋</span> Copy
          </button>
          <button id="testImageBtn" class="btn btn-ghost">
            🧪 Test Image
          </button>
          <button id="goStep2Btn" class="btn btn-primary" style="display:none;">
            ถัดไป →
          </button>
        </div>
      </div>

      <!-- Step 2: Video Generation -->
      <div class="step-panel" id="stepPanel2">

        <div class="form-group">
          <label>GENDER</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="gender2" value="male" checked>
              <span class="radio-label"><span class="radio-dot"></span>ผู้ชาย</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="gender2" value="female">
              <span class="radio-label"><span class="radio-dot"></span>ผู้หญิง</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label>ACTION</label>
          <select id="action2">
            <option value="รีวิวสินค้าต่อหน้ากล้อง">รีวิวสินค้าต่อหน้ากล้อง</option>
            <option value="สาธิตการใช้งาน">สาธิตการใช้งาน</option>
            <option value="แกะกล่องสด">แกะกล่องสด</option>
            <option value="ติดตั้งสินค้า">ติดตั้งสินค้า</option>
            <option value="เปรียบเทียบก่อน-หลัง">เปรียบเทียบก่อน-หลัง</option>
          </select>
        </div>

        <div class="form-group">
          <label>Script / Key Message</label>
          <textarea id="scriptInput" rows="4" placeholder="Enter script here..."></textarea>
        </div>

        <div class="form-group">
          <label>PLATFORM</label>
          <select id="platform2">
            <option value="TikTok">TikTok</option>
            <option value="Reels">Reels</option>
            <option value="Facebook">Facebook</option>
          </select>
        </div>

        <div class="form-group">
          <label>PACING</label>
          <select id="pacing2">
            <option value="ตัดเร็วฉับๆ แบบ TikTok">ตัดเร็วฉับๆ แบบ TikTok</option>
            <option value="ช้าๆ อธิบายละเอียด">ช้าๆ อธิบายละเอียด</option>
            <option value="ผสมทั้งสองแบบ">ผสมทั้งสองแบบ</option>
          </select>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>Video Ratio</label>
            <select id="ratioSelect">
              <option value="9:16">Portrait 9:16</option>
              <option value="16:9">Landscape 16:9</option>
            </select>
          </div>
          <div class="form-group">
            <label>Quantity</label>
            <select id="quantitySelect">
              <option value="4">4 Clips</option>
              <option value="2">2 Clips</option>
              <option value="1">1 Clip</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Veo Model</label>
          <select id="veoModelSelect">
            <option value="Veo 3.1 - Fast">Veo 3.1 - Fast</option>
            <option value="Veo 3.1 - Quality">Veo 3.1 - Quality</option>
          </select>
        </div>

        <div class="form-group">
          <label>AI Model</label>
          <div class="radio-group model-selector">
            <label class="radio-option">
              <input type="radio" name="flowModel" value="chatgpt" checked>
              <span class="radio-label"><span class="radio-dot"></span>ChatGPT</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="flowModel" value="gemini">
              <span class="radio-label"><span class="radio-dot"></span>Gemini</span>
            </label>
          </div>
        </div>

        <!-- Hidden fields for content script compatibility -->
        <input type="hidden" id="languageSelect" value="Thai">
        <input type="hidden" id="cameraAngle" value="static">

        <div class="form-group">
          <label>Prompt Preview</label>
          <textarea id="promptPreview2" class="prompt-preview" rows="8" readonly placeholder="Prompt จะแสดงที่นี่..."></textarea>
        </div>

        <div class="actions step-nav">
          <button id="backStep1Btn" class="btn btn-ghost">← ก่อนหน้า</button>
          <button id="goStep3Btn" class="btn btn-primary">ถัดไป →</button>
        </div>
      </div>

      <!-- Step 3: Caption Generation -->
      <div class="step-panel" id="stepPanel3">
        <div class="form-group">
          <label>PLATFORM</label>
          <select id="platform3">
            <option value="TikTok">TikTok</option>
            <option value="Facebook">Facebook</option>
            <option value="Instagram">Instagram</option>
            <option value="Shopee">Shopee</option>
          </select>
        </div>

        <div class="form-group">
          <label>Script / Key Message</label>
          <textarea id="captionScript" rows="3" placeholder="Key message จาก Step 2..."></textarea>
        </div>

        <div class="form-group">
          <label>TARGET AUDIENCE</label>
          <select id="audience3">
            <option value="คนมีบ้าน">คนมีบ้าน</option>
            <option value="ช่างไฟ">ช่างไฟ</option>
            <option value="แม่บ้าน">แม่บ้าน</option>
            <option value="คนรักสวน">คนรักสวน</option>
            <option value="เจ้าของร้าน">เจ้าของร้าน</option>
            <option value="คนทั่วไป">คนทั่วไป</option>
          </select>
        </div>

        <div class="form-group">
          <label>HOOK STYLE</label>
          <select id="hookStyle3">
            <option value="คำถาม">คำถาม</option>
            <option value="ความขัดแย้ง">ความขัดแย้ง</option>
            <option value="ตัวเลขน่าตกใจ">ตัวเลขน่าตกใจ</option>
            <option value="เรื่องเล่าสั้น">เรื่องเล่าสั้น</option>
          </select>
        </div>

        <div class="form-group">
          <label>Caption Prompt Preview</label>
          <textarea id="promptPreview3" class="prompt-preview" rows="8" readonly placeholder="Caption prompt จะแสดงที่นี่..."></textarea>
        </div>

        <div class="form-group">
          <label>TikTok Caption</label>
          <textarea id="captionInput" rows="3" placeholder="Caption สำหรับ TikTok..."></textarea>
        </div>

        <div class="actions step-nav">
          <button id="backStep2Btn" class="btn btn-ghost">← ก่อนหน้า</button>
          <button id="goStep4Btn" class="btn btn-primary">ถัดไป →</button>
        </div>
      </div>

      <!-- Step 4: Run All -->
      <div class="step-panel" id="stepPanel4">
        <div class="form-group">
          <label>TikTok Product ID</label>
          <input type="text" id="productIdInput" placeholder="e.g. 1234567890123456789">
        </div>

        <div class="run-summary">
          <div class="run-summary-item">✨ Generate Video Prompt</div>
          <div class="run-summary-item">🤖 Generate Caption</div>
          <div class="run-summary-item">🎬 Create Video on Flow</div>
          <div class="run-summary-item">⬇️ Download Video</div>
          <div class="run-summary-item">📤 Upload to TikTok Studio</div>
        </div>

        <div class="actions step-nav" style="margin-top: 12px;">
          <button id="backStep3Btn" class="btn btn-ghost">← ก่อนหน้า</button>
          <button id="runAllBtn" class="btn btn-run">
            🚀 เริ่มทำงาน
          </button>
        </div>

        <div style="margin-top: 8px; display:flex; gap:6px;">
          <button id="testDownloadBtn" class="btn btn-ghost" style="display:none; flex:1">🧪 Test Download</button>
          <button id="testUploadBtn" class="btn btn-ghost" style="display:none; flex:1">📤 Test Upload</button>
        </div>
      </div>

    </div>
    <!-- /flowUI -->

    <!-- SORA UI SECTION -->
    <div id="soraUI" class="hidden">
      <div class="section product-image-section">
        <label class="section-label">Reference Image <span class="required">*</span></label>
        <div class="image-upload-area" id="soraImageUploadArea">
          <input type="file" id="soraImageInput" accept="image/*" hidden>
          <div class="upload-placeholder" id="soraUploadPlaceholder">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 5V19M5 12H19" stroke="#64748B" stroke-width="2" stroke-linecap="round" />
            </svg>
          </div>
          <img id="soraImagePreview" class="image-preview hidden" src="" alt="Preview">
          <button class="remove-image-btn hidden" id="soraRemoveImageBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Your Character (Optional)</label>
          <input type="text" id="soraCharacter">
        </div>
        <div class="form-group">
          <label>Ratio</label>
          <select id="soraRatio">
            <option value="9:16">9:16</option>
            <option value="16:9">16:9</option>
          </select>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Style</label>
          <select id="soraStyle">
            <option value="Winter">Winter</option>
            <option value="Comic">Comic</option>
            <option value="News">News</option>
            <option value="Selfie">Selfie</option>
            <option value="Handheld">Handheld</option>
            <option value="Anime">Anime</option>
          </select>
        </div>
        <div class="form-group">
          <label>Decide your video</label>
          <input type="text" id="soraDecide">
        </div>
      </div>

      <div class="form-group">
        <label>Prompt</label>
        <textarea id="soraPromptInput" rows="6" class="prompt-area"></textarea>
      </div>

      <div class="form-group">
        <label>Spoken Language</label>
        <select id="soraLanguageSelect">
          <option value="Thai">Thai</option>
          <option value="English">English</option>
          <option value="Japanese">Japanese</option>
          <option value="Chinese">Chinese</option>
          <option value="Korean">Korean</option>
          <option value="Spanish">Spanish</option>
          <option value="French">French</option>
          <option value="German">German</option>
        </select>
      </div>

      <div class="form-group">
        <label>AI Model</label>
        <div class="radio-group model-selector">
          <label class="radio-option">
            <input type="radio" name="soraModel" value="chatgpt" checked>
            <span class="radio-label"><span class="radio-dot"></span>ChatGPT</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="soraModel" value="gemini">
            <span class="radio-label"><span class="radio-dot"></span>Gemini</span>
          </label>
        </div>
      </div>

      <div class="actions">
        <button id="soraGeneratePromptBtn" class="btn btn-secondary">
          Generate Prompt
        </button>

        <div class="action-row">
          <button id="soraCancelBtn" class="btn btn-ghost">Cancel</button>
          <button id="soraGenerateBtn" class="btn btn-primary">
            Generate
          </button>
        </div>
      </div>
    </div>

    <!-- Automation Overlay -->
    <div id="automationOverlay" class="hidden">
      <button id="overlayCancelBtn" class="overlay-cancel-btn" title="ยกเลิก">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
      <div class="overlay-content">
        <div class="overlay-spinner"></div>
        <div class="overlay-title">🤖 กำลังทำงานอัตโนมัติ</div>
        <div class="overlay-step" id="overlayStepText">กำลังเริ่มต้น...</div>
        <div class="overlay-warning">⚠️ ห้ามกดอะไรระหว่างนี้</div>
      </div>
    </div>

    <div class="status-bar hidden" id="statusBar">
      <div class="status-bar-header">
        <span id="statusText">กำลังสร้างวิดีโอ.. รอสักครู่</span>
        <button id="statusCancelBtn" class="status-cancel-btn" title="ยกเลิก">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width: 0%"></div>
      </div>
    </div>

  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>ตั้งค่า API Key</h2>
        <button id="closeSettingsBtn" class="close-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="googleApiKey">Google API Key</label>
          <input type="password" id="googleApiKey" placeholder="AIzaSy...">
        </div>
        <div class="form-group">
          <label for="chatgptApiKey">ChatGPT API Key</label>
          <input type="password" id="chatgptApiKey" placeholder="sk-...">
        </div>
      </div>
      <div class="modal-footer">
        <button id="saveSettingsBtn" class="btn btn-primary">บันทึก</button>
      </div>
    </div>
  </div>
  <script>
    try {
      if (!chrome.sidePanel) {
        document.body.classList.add('popup-mode');
      } else {
        chrome.runtime.getPlatformInfo(({ os }) => {
          const isMobile = os === 'android' || os === 'ios';
          if (isMobile) document.body.classList.add('popup-mode');
        });
      }
    } catch (e) {
      document.body.classList.add('popup-mode');
    }
  </script>
  <script src="sidepanel.js"></script>
</body>

</html>
