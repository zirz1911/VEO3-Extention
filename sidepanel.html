<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PD Auto VEO3.1</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <header>
      <div class="logo">
        <button class="menu-btn" id="menuBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 7L22 7" stroke="#F97316" stroke-width="2" stroke-linecap="round" />
            <path d="M2 12L22 12" stroke="#F97316" stroke-width="2" stroke-linecap="round" />
            <path d="M2 17L22 17" stroke="#F97316" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
        <h1>Gen Flow Flow</h1>
        <!-- Dropdown Menu -->
        <div id="platformMenu" class="dropdown-menu hidden">
          <div class="dropdown-item" data-url="https://labs.google/">Flow</div>
          <div class="dropdown-item" data-url="https://sora.chatgpt.com/">SORA</div>
          <div class="dropdown-item" data-url="https://www.meta.ai/">Meta</div>
        </div>
      </div>
      <button class="settings-btn" id="settingsBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z"
            fill="#E2E8F0" />
          <path fill-rule="evenodd" clip-rule="evenodd"
            d="M19.4 15C19.7 14.1 20 13.1 20 12C20 10.9 19.7 9.9 19.4 9H21.9C22 10 22 11 22 12C22 13 22 14 21.9 15H19.4ZM17.6 18.2C17.1 18.9 16.5 19.5 15.8 20.1L17.6 21.8C18.7 20.8 19.6 19.6 20.3 18.2L17.6 18.2ZM13.4 20.9C13 21 12.5 21 12 21C11.5 21 11 21 10.6 20.9V23.9C11 24 11.5 24 12 24C12.5 24 13 24 13.4 23.9V20.9ZM8.2 20.1C7.5 19.5 6.9 18.9 6.4 18.2L3.7 18.2C4.4 19.6 5.3 20.8 6.4 21.8L8.2 20.1ZM4.6 15H2.1C2 14 2 13 2 12C2 11 2 10 2.1 9H4.6C4.3 9.9 4 10.9 4 12C4 13.1 4.3 14.1 4.6 15ZM6.4 5.8C6.9 5.1 7.5 4.5 8.2 3.9L6.4 2.2C5.3 3.2 4.4 4.4 3.7 5.8L6.4 5.8ZM10.6 3.1C11 3 11.5 3 12 3C12.5 3 13 3 13.4 3.1V0.1C13 0 12.5 0 12 0C11.5 0 11 0 10.6 0.1V3.1ZM15.8 3.9C16.5 4.5 17.1 5.1 17.6 5.8L20.3 5.8C19.6 4.4 18.7 3.2 17.6 2.2L15.8 3.9Z"
            fill="#E2E8F0" />
        </svg>
      </button>
    </header>

    <!-- FLOW UI SECTION -->
    <div id="flowUI">
      <div class="section product-image-section">
        <label class="section-label">Reference Image <span class="required">*</span></label>
        <div class="image-upload-area" id="imageUploadArea">
          <input type="file" id="productImageInput" accept="image/*" hidden>
          <div class="upload-placeholder" id="uploadPlaceholder">
            <!-- Placeholder content will be handled by JS or CSS background -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 5V19M5 12H19" stroke="#64748B" stroke-width="2" stroke-linecap="round" />
            </svg>
          </div>
          <img id="imagePreview" class="image-preview hidden" src="" alt="Product Preview">
          <button class="remove-image-btn hidden" id="removeImageBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="productName" placeholder="Optional">
        </div>

        <div class="form-group">
          <label>Video Ratio</label>
          <select id="ratioSelect">
            <option value="9:16">Portrait 9:16</option>
            <option value="16:9">Landscape 16:9</option>
          </select>
        </div>
        <div class="form-group">
          <label>Quantity</label>
          <select id="quantitySelect">
            <option value="4">4 Clips</option>
            <option value="2">2 Clips</option>
            <option value="1">1 Clip</option>
          </select>
        </div>
        <div class="form-group">
          <label>Veo Model</label>
          <select id="veoModelSelect">
            <option value="Veo 3.1 - Fast">Veo 3.1 - Fast</option>
            <option value="Veo 3.1 - Quality">Veo 3.1 - Quality</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Camera Angle</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="camera" value="static" checked>
            <span class="radio-label"><span class="radio-dot"></span>Static</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="camera" value="dynamic">
            <span class="radio-label"><span class="radio-dot"></span>Dynamic</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>Script</label>
        <textarea id="scriptInput" rows="4" placeholder="Enter script here..."></textarea>
      </div>

      <div class="form-group">
        <label>TikTok Caption</label>
        <textarea id="captionInput" rows="3" placeholder="Caption สำหรับ TikTok..."></textarea>
      </div>

      <div class="form-group">
        <label>TikTok Product ID</label>
        <input type="text" id="productIdInput" placeholder="e.g. 1234567890123456789">
      </div>

      <div class="form-group">
        <label>Spoken Language</label>
        <select id="languageSelect">
          <option value="Thai">Thai</option>
          <option value="English">English</option>
          <option value="Japanese">Japanese</option>
          <option value="Chinese">Chinese</option>
          <option value="Korean">Korean</option>
          <option value="Spanish">Spanish</option>
          <option value="French">French</option>
          <option value="German">German</option>
        </select>
      </div>

      <div class="form-group">
        <label>AI Model</label>
        <div class="radio-group model-selector">
          <label class="radio-option">
            <input type="radio" name="flowModel" value="chatgpt" checked>
            <span class="radio-label"><span class="radio-dot"></span>ChatGPT</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="flowModel" value="gemini">
            <span class="radio-label"><span class="radio-dot"></span>Gemini</span>
          </label>
        </div>
      </div>

      <div class="actions">
        <button id="analyzeBtn" class="btn btn-secondary">
          <span class="icon">✨</span> Generate Prompt
        </button>

        <div class="action-row">
          <button id="cancelBtn" class="btn btn-ghost">Cancel</button>
          <button id="createBtn" class="btn btn-primary">
            <span class="icon">✨</span> Create Video
          </button>
        </div>

        <button id="testDownloadBtn" class="btn btn-ghost" style="display:none;">
          🧪 Test Download
        </button>
        <button id="testUploadBtn" class="btn btn-ghost" style="display:none;">
          📤 Test Upload
        </button>

        <button id="tiktokBtn" class="btn btn-tiktok">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/>
          </svg>
          Open TikTok Studio
        </button>
      </div>
    </div>

    <!-- SORA UI SECTION -->
    <div id="soraUI" class="hidden">
      <div class="section product-image-section">
        <label class="section-label">Reference Image <span class="required">*</span></label>
        <div class="image-upload-area" id="soraImageUploadArea">
          <input type="file" id="soraImageInput" accept="image/*" hidden>
          <div class="upload-placeholder" id="soraUploadPlaceholder">
            <!-- Placeholder -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 5V19M5 12H19" stroke="#64748B" stroke-width="2" stroke-linecap="round" />
            </svg>
          </div>
          <img id="soraImagePreview" class="image-preview hidden" src="" alt="Preview">
          <button class="remove-image-btn hidden" id="soraRemoveImageBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Your Character (Optional)</label>
          <input type="text" id="soraCharacter">
        </div>
        <div class="form-group">
          <label>Ratio</label>
          <select id="soraRatio">
            <option value="9:16">9:16</option>
            <option value="16:9">16:9</option>
          </select>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Style</label>
          <select id="soraStyle">
            <option value="Winter">Winter</option>
            <option value="Comic">Comic</option>
            <option value="News">News</option>
            <option value="Selfie">Selfie</option>
            <option value="Handheld">Handheld</option>
            <option value="Anime">Anime</option>
          </select>
        </div>
        <div class="form-group">
          <label>Decide your video</label>
          <input type="text" id="soraDecide">
        </div>
      </div>

      <div class="form-group">
        <label>Prompt</label>
        <textarea id="soraPromptInput" rows="6" class="prompt-area"></textarea>
      </div>

      <div class="form-group">
        <label>Spoken Language</label>
        <select id="soraLanguageSelect">
          <option value="Thai">Thai</option>
          <option value="English">English</option>
          <option value="Japanese">Japanese</option>
          <option value="Chinese">Chinese</option>
          <option value="Korean">Korean</option>
          <option value="Spanish">Spanish</option>
          <option value="French">French</option>
          <option value="German">German</option>
        </select>
      </div>

      <div class="form-group">
        <label>AI Model</label>
        <div class="radio-group model-selector">
          <label class="radio-option">
            <input type="radio" name="soraModel" value="chatgpt" checked>
            <span class="radio-label"><span class="radio-dot"></span>ChatGPT</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="soraModel" value="gemini">
            <span class="radio-label"><span class="radio-dot"></span>Gemini</span>
          </label>
        </div>
      </div>

      <div class="actions">
        <button id="soraGeneratePromptBtn" class="btn btn-secondary">
          Generate Prompt
        </button>

        <div class="action-row">
          <button id="soraCancelBtn" class="btn btn-ghost">Cancel</button>
          <button id="soraGenerateBtn" class="btn btn-primary">
            Generate
          </button>
        </div>
      </div>
    </div>

    <!-- Automation Overlay -->
    <div id="automationOverlay" class="hidden">
      <div class="overlay-content">
        <div class="overlay-spinner"></div>
        <div class="overlay-title">🤖 กำลังทำงานอัตโนมัติ</div>
        <div class="overlay-step" id="overlayStepText">กำลังเริ่มต้น...</div>
        <div class="overlay-warning">⚠️ ห้ามกดอะไรระหว่างนี้</div>
      </div>
    </div>

    <div class="status-bar hidden" id="statusBar">
      <span id="statusText">กำลังสร้างวิดีโอ.. รอสักครู่</span>
      <div class="progress-track">
        <div class="progress-fill" style="width: 0%"></div>
      </div>
    </div>

  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>ตั้งค่า API Key</h2>
        <button id="closeSettingsBtn" class="close-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="googleApiKey">Google API Key</label>
          <input type="password" id="googleApiKey" placeholder="AIzaSy...">
        </div>
        <div class="form-group">
          <label for="chatgptApiKey">ChatGPT API Key</label>
          <input type="password" id="chatgptApiKey" placeholder="sk-...">
        </div>
      </div>
      <div class="modal-footer">
        <button id="saveSettingsBtn" class="btn btn-primary">บันทึก</button>
      </div>
    </div>
  </div>
  <script>
    // ถ้าเปิดเป็น popup (ไม่ใช่ side panel) → ใส่ class popup-mode
    chrome.runtime.getPlatformInfo(({ os }) => {
      const isMobile = os === 'android' || os === 'ios';
      const isPopup = !chrome.sidePanel || isMobile;
      if (isPopup) document.body.classList.add('popup-mode');
    });
  </script>
  <script src="sidepanel.js"></script>
</body>

</html>
