<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PD Auto VEO3.1</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 7L22 7" stroke="#F97316" stroke-width="2" stroke-linecap="round" />
          <path d="M2 12L22 12" stroke="#F97316" stroke-width="2" stroke-linecap="round" />
          <path d="M2 17L22 17" stroke="#F97316" stroke-width="2" stroke-linecap="round" />
        </svg>
        <h1>Gen Flow Flow</h1>
      </div>
      <button class="settings-btn" id="settingsBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z"
            fill="#E2E8F0" />
          <path fill-rule="evenodd" clip-rule="evenodd"
            d="M19.4 15C19.7 14.1 20 13.1 20 12C20 10.9 19.7 9.9 19.4 9H21.9C22 10 22 11 22 12C22 13 22 14 21.9 15H19.4ZM17.6 18.2C17.1 18.9 16.5 19.5 15.8 20.1L17.6 21.8C18.7 20.8 19.6 19.6 20.3 18.2L17.6 18.2ZM13.4 20.9C13 21 12.5 21 12 21C11.5 21 11 21 10.6 20.9V23.9C11 24 11.5 24 12 24C12.5 24 13 24 13.4 23.9V20.9ZM8.2 20.1C7.5 19.5 6.9 18.9 6.4 18.2L3.7 18.2C4.4 19.6 5.3 20.8 6.4 21.8L8.2 20.1ZM4.6 15H2.1C2 14 2 13 2 12C2 11 2 10 2.1 9H4.6C4.3 9.9 4 10.9 4 12C4 13.1 4.3 14.1 4.6 15ZM6.4 5.8C6.9 5.1 7.5 4.5 8.2 3.9L6.4 2.2C5.3 3.2 4.4 4.4 3.7 5.8L6.4 5.8ZM10.6 3.1C11 3 11.5 3 12 3C12.5 3 13 3 13.4 3.1V0.1C13 0 12.5 0 12 0C11.5 0 11 0 10.6 0.1V3.1ZM15.8 3.9C16.5 4.5 17.1 5.1 17.6 5.8L20.3 5.8C19.6 4.4 18.7 3.2 17.6 2.2L15.8 3.9Z"
            fill="#E2E8F0" />
        </svg>
      </button>
    </header>

    <div class="section product-image-section">
      <label class="section-label">รูปต้นแบบ <span class="required">*</span></label>
      <div class="image-upload-area" id="imageUploadArea">
        <input type="file" id="productImageInput" accept="image/*" hidden>
        <div class="upload-placeholder" id="uploadPlaceholder">
          <!-- Placeholder content will be handled by JS or CSS background -->
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 5V19M5 12H19" stroke="#64748B" stroke-width="2" stroke-linecap="round" />
          </svg>
        </div>
        <img id="imagePreview" class="image-preview hidden" src="" alt="Product Preview">
        <button class="remove-image-btn hidden" id="removeImageBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label>ชื่อสินค้า</label>
        <input type="text" id="productName" placeholder="ไม่บังคับ">
      </div>

      <div class="form-group">
        <label>สัดส่วนวิดีโอ</label>
        <select id="ratioSelect">
          <option value="9:16">แนวตั้ง 9:16</option>
          <option value="16:9">แนวนอน 16:9</option>
          <option value="1:1">สี่เหลี่ยม 1:1</option>
        </select>
      </div>
      <div class="form-group">
        <label>จำนวน</label>
        <select id="quantitySelect">
          <option value="4">4 คลิป</option>
          <option value="2">2 คลิป</option>
          <option value="1">1 คลิป</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>มุมกล้อง</label>
      <div class="radio-group">
        <label class="radio-option">
          <input type="radio" name="camera" value="static" checked>
          <span class="radio-label"><span class="radio-dot"></span>นิ่ง</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="camera" value="dynamic">
          <span class="radio-label"><span class="radio-dot"></span>สุ่ม</span>
        </label>
      </div>
    </div>

    <div class="form-group">
      <label>บทพูด</label>
      <textarea id="scriptInput" rows="4" placeholder="ใส่บทพูดที่นี่..."></textarea>
    </div>

    <div class="actions">
      <button id="analyzeBtn" class="btn btn-secondary" disabled>
        <span class="icon">✨</span> Generate Prompt
      </button>

      <div class="action-row">
        <button id="cancelBtn" class="btn btn-ghost">ยกเลิก</button>
        <button id="createBtn" class="btn btn-primary">
          <span class="icon">✨</span> สร้างวิดีโอ
        </button>
      </div>
    </div>

    <div class="status-bar hidden" id="statusBar">
      <span id="statusText">กำลังสร้างวิดีโอ.. รอสักครู่</span>
      <div class="progress-track">
        <div class="progress-fill" style="width: 0%"></div>
      </div>
    </div>

  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>ตั้งค่า API Key</h2>
        <button id="closeSettingsBtn" class="close-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="googleApiKey">Google API Key</label>
          <input type="password" id="googleApiKey" placeholder="AIzaSy...">
        </div>
        <div class="form-group">
          <label for="chatgptApiKey">ChatGPT API Key</label>
          <input type="password" id="chatgptApiKey" placeholder="sk-...">
        </div>
      </div>
      <div class="modal-footer">
        <button id="saveSettingsBtn" class="btn btn-primary">บันทึก</button>
      </div>
    </div>
  </div>
  <script src="sidepanel.js"></script>
</body>

</html>
